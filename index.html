<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>A Message For You 💕</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  font-family:'Cormorant Garamond', serif;

  background:
    radial-gradient(circle at top left,#39104a 0%,#120818 55%,#09050f 100%);
}

/* STARS */

#stars{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:0;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;

  animation:twinkle 3s infinite ease-in-out;
}

@keyframes twinkle{
  0%,100%{
    opacity:.2;
    transform:scale(1);
  }

  50%{
    opacity:1;
    transform:scale(1.7);
  }
}

/* CARD */

.card{
  position:relative;
  z-index:5;

  width:90%;
  max-width:540px;

  padding:45px 28px;

  border-radius:28px;

  background:rgba(255,255,255,.05);

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,180,200,.15);

  text-align:center;

  box-shadow:
    0 0 80px rgba(232,82,122,.18),
    inset 0 1px 0 rgba(255,255,255,.05);

  animation:fadeUp 1s ease;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(30px);
  }

  to{
    opacity:1;
    transform:none;
  }
}

.top{
  font-size:10px;
  letter-spacing:.25em;
  text-transform:uppercase;

  color:rgba(255,180,200,.55);

  font-family:'Cinzel', serif;

  margin-bottom:14px;
}

.title{
  color:#ffb3cc;
  font-size:30px;
  margin-bottom:18px;
}

.line{
  width:70px;
  height:1px;

  margin:auto;
  margin-bottom:28px;

  background:linear-gradient(
    to right,
    transparent,
    rgba(255,180,200,.7),
    transparent
  );
}

/* HEART */

.heart-wrap{
  position:relative;

  width:120px;
  height:120px;

  margin:auto;
  margin-bottom:24px;
}

.ring{
  position:absolute;
  inset:0;

  border-radius:50%;

  border:1px solid rgba(232,82,122,.35);

  animation:ring 2s infinite ease-in-out;
}

.ring2{
  inset:-10px;
  opacity:.5;
}

@keyframes ring{
  0%,100%{
    transform:scale(1);
    opacity:.4;
  }

  50%{
    transform:scale(1.08);
    opacity:1;
  }
}

.heart{
  position:absolute;
  inset:10px;

  border:none;
  border-radius:50%;

  background:
    linear-gradient(135deg,#ff5f95,#c2185b);

  color:white;

  font-size:42px;

  cursor:pointer;

  box-shadow:
    0 0 40px rgba(232,82,122,.7);

  animation:heartbeat 1.8s infinite;

  transition:.2s;
}

.heart:hover{
  transform:scale(1.06);
}

.heart:active{
  transform:scale(.9);
}

@keyframes heartbeat{
  0%,100%{
    transform:scale(1);
  }

  14%{
    transform:scale(1.14);
  }

  28%{
    transform:scale(1);
  }

  42%{
    transform:scale(1.08);
  }
}

/* MESSAGE */

.message-box{
  min-height:140px;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:24px;

  border-radius:20px;

  background:rgba(255,255,255,.04);

  border:1px solid rgba(255,180,200,.1);

  margin-bottom:18px;
}

.message{
  color:#ffe0ec;

  font-size:21px;

  line-height:1.7;

  font-style:italic;

  animation:fadeMessage .6s ease;
}

@keyframes fadeMessage{
  from{
    opacity:0;
    transform:translateY(12px);
  }

  to{
    opacity:1;
    transform:none;
  }
}

.hint{
  color:rgba(255,180,200,.4);

  font-size:10px;

  letter-spacing:.18em;

  text-transform:uppercase;

  font-family:'Cinzel', serif;

  margin-bottom:14px;
}

.counter{
  color:rgba(255,180,200,.3);

  font-size:12px;

  letter-spacing:.15em;

  font-family:'Cinzel', serif;
}

/* PETALS */

#petals{
  position:fixed;
  inset:0;

  overflow:hidden;

  pointer-events:none;

  z-index:3;
}

.petal{
  position:absolute;
  top:-40px;

  animation:fall linear forwards;
}

@keyframes fall{
  from{
    transform:translateY(0) rotate(0deg);
    opacity:1;
  }

  to{
    transform:
      translateY(110vh)
      translateX(var(--x))
      rotate(720deg);

    opacity:0;
  }
}

/* FIREWORKS */

canvas{
  position:fixed;
  inset:0;

  pointer-events:none;

  z-index:2;
}

@media(max-width:520px){

  .title{
    font-size:24px;
  }

  .message{
    font-size:18px;
  }

  .card{
    padding:35px 20px;
  }
}

</style>
</head>

<body>

<!-- AUDIO -->

<audio id="bgMusic" loop preload="auto">
  <source src="./gaaju-bomma.mp3" type="audio/mpeg">
</audio>

<!-- STARS -->

<div id="stars"></div>

<!-- PETALS -->

<div id="petals"></div>

<!-- FIREWORKS -->

<canvas id="fireworks"></canvas>

<!-- CARD -->

<div class="card">

  <div class="top">
    a message for you
  </div>

  <div class="title" id="title">
    Sita 💕
  </div>

  <div class="line"></div>

  <div class="heart-wrap">

    <div class="ring"></div>

    <div class="ring ring2"></div>

    <button class="heart" id="heart">
      ❤️
    </button>

  </div>

  <div class="message-box">

    <div class="message" id="message">
      Tap the heart to open a message made just for you…
    </div>

  </div>

  <div class="hint" id="hint">
    tap the heart ✦
  </div>

  <div class="counter" id="counter"></div>

</div>

<script>

/* MESSAGES */

const messages = [

"Three months of silence… but my heart never stopped thinking about you.",

"I miss your laugh more than words can explain.",

"I've replayed our memories a thousand times in my head.",

"You still cross my mind during songs, nights, and quiet moments.",

"I never wanted distance to grow between us.",

"You made ordinary moments feel magical.",

"I wish I could go back and hold onto every conversation longer.",

"There's a softer version of me that only exists around you.",

"Some feelings don't fade with time… mine never did.",

"You are worth every vulnerable word and every risk.",

"No matter what happens… you are deeply loved.",

"You are, and always will be, my favorite person. 💕"

];

/* ELEMENTS */

const heart =
  document.getElementById('heart');

const message =
  document.getElementById('message');

const counter =
  document.getElementById('counter');

const petals =
  document.getElementById('petals');

const title =
  document.getElementById('title');

const hint =
  document.getElementById('hint');

const music =
  document.getElementById('bgMusic');

/* STATES */

let current = -1;
let musicStarted = false;

/* STARS */

const stars =
  document.getElementById('stars');

for(let i=0;i<100;i++){

  const s =
    document.createElement('div');

  s.className = 'star';

  s.style.left =
    Math.random()*100 + '%';

  s.style.top =
    Math.random()*100 + '%';

  s.style.width =
  s.style.height =
    Math.random()*3 + 'px';

  s.style.animationDelay =
    Math.random()*4 + 's';

  stars.appendChild(s);
}

/* PETALS */

function dropPetals(count=8){

  const icons = [
    '🌸','💕','✨','🌹','💖','🌷'
  ];

  for(let i=0;i<count;i++){

    const p =
      document.createElement('div');

    p.className = 'petal';

    p.innerHTML =
      icons[Math.floor(Math.random()*icons.length)];

    p.style.left =
      Math.random()*100 + '%';

    p.style.fontSize =
      14 + Math.random()*18 + 'px';

    p.style.setProperty(
      '--x',
      (Math.random()-.5)*200 + 'px'
    );

    p.style.animationDuration =
      3 + Math.random()*3 + 's';

    petals.appendChild(p);

    setTimeout(()=>{
      p.remove();
    },6000);
  }
}

/* FIREWORKS */

const canvas =
  document.getElementById('fireworks');

const ctx =
  canvas.getContext('2d');

let particles = [];

function resize(){

  canvas.width = innerWidth;
  canvas.height = innerHeight;
}

resize();

window.addEventListener('resize',resize);

function firework(x,y){

  for(let i=0;i<60;i++){

    particles.push({

      x,
      y,

      vx:(Math.random()-.5)*8,
      vy:(Math.random()-.5)*8,

      alpha:1,

      size:2 + Math.random()*3
    });
  }
}

function animate(){

  requestAnimationFrame(animate);

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  particles =
    particles.filter(p=>p.alpha>0);

  particles.forEach(p=>{

    p.x += p.vx;
    p.y += p.vy;

    p.vy += 0.03;

    p.alpha -= 0.015;

    ctx.globalAlpha = p.alpha;

    ctx.beginPath();

    ctx.arc(
      p.x,
      p.y,
      p.size,
      0,
      Math.PI*2
    );

    ctx.fillStyle = '#ff78b0';

    ctx.fill();
  });
}

animate();

/* HEART CLICK */

heart.addEventListener('click', async ()=>{

  /* START MUSIC */

  if(!musicStarted){

    musicStarted = true;

    music.currentTime = 15;

    try{
      await music.play();
    }
    catch(err){
      console.log(err);
    }
  }

  /* NEXT MESSAGE */

  current++;

  if(current >= messages.length){
    current = 0;
  }

  message.style.animation = 'none';

  void message.offsetWidth;

  message.innerHTML =
    messages[current];

  message.style.animation =
    'fadeMessage .6s ease';

  counter.innerHTML =
    `${current+1} / ${messages.length}`;

  /* PETALS */

  dropPetals(
    current === messages.length-1
    ? 18
    : 8
  );

  /* FIREWORKS */

  if(
    current % 3 === 2 ||
    current === messages.length-1
  ){

    for(let i=0;i<3;i++){

      setTimeout(()=>{

        firework(
          100 + Math.random()*(innerWidth-200),
          100 + Math.random()*(innerHeight/2)
        );

      },i*250);
    }
  }

  /* FINAL MESSAGE */

  if(current === messages.length-1){

    title.innerHTML =
      "💌 With all my love";

    hint.innerHTML =
      "you mean everything to me ✦";
  }

});

</script>

</body>
</html>
