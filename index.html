<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Message For You 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #e8527a;
    --rose-deep: #c2185b;
    --rose-light: #ffb3cc;
    --rose-pale: #ffe0ec;
    --gold: #f4c06e;
    --bg-deep: #120818;
    --bg-mid: #1e0d2e;
    --card-bg: rgba(255,255,255,0.055);
    --card-border: rgba(255,180,200,0.22);
  }

  html, body {
    height: 100%;
    background: var(--bg-deep);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow-x: hidden;
  }

  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: radial-gradient(ellipse at 30% 20%, #2d1040 0%, #120818 55%, #0d0816 100%);
  }

  /* ── Stars ── */
  #stars-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute; border-radius: 50%; background: #fff;
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.08; transform: scale(1); }
    50%      { opacity: 0.95; transform: scale(1.5); }
  }

  /* ── Petals layer ── */
  #petals-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden;
  }
  .petal {
    position: absolute; top: -40px;
    animation: petalfall linear forwards;
    font-size: 20px; opacity: 0.85;
  }
  @keyframes petalfall {
    0%   { transform: translateY(0)    rotate(0deg)   translateX(0);         opacity: 0.9; }
    100% { transform: translateY(110vh) rotate(800deg) translateX(var(--dx)); opacity: 0;   }
  }

  /* ── Main wrapper ── */
  #app {
    position: relative; z-index: 2;
    width: 100%; max-width: 540px;
    padding: 1.5rem;
    display: flex; flex-direction: column; align-items: center;
  }

  /* ── Card ── */
  .card {
    width: 100%;
    background: var(--card-bg);
    backdrop-filter: blur(18px) saturate(1.4);
    -webkit-backdrop-filter: blur(18px) saturate(1.4);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 2.8rem 2.2rem 2.2rem;
    text-align: center;
    box-shadow:
      0 0 80px rgba(200,80,140,0.18),
      0 0 160px rgba(100,30,80,0.12),
      inset 0 1px 0 rgba(255,200,220,0.12);
    animation: cardIn 1s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.94); }
    to   { opacity: 1; transform: none; }
  }

  /* ── Top label ── */
  .eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(255,180,200,0.55); margin-bottom: 0.6rem;
  }

  /* ── Name ── */
  .name {
    font-size: 26px; font-weight: 500;
    color: var(--rose-light);
    letter-spacing: 0.04em;
    margin-bottom: 0.2rem;
    transition: all 0.5s ease;
  }

  /* ── Divider ── */
  .divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,150,180,0.5), transparent);
    margin: 1rem auto;
  }

  /* ── Heart button ── */
  .heart-wrap {
    margin: 1rem auto 1.4rem;
    position: relative; display: inline-flex;
  }
  .heart-ring {
    position: absolute; inset: -12px; border-radius: 50%;
    border: 1px solid rgba(232,82,122,0.35);
    animation: ringpulse 2.2s ease-in-out infinite;
  }
  .heart-ring2 {
    position: absolute; inset: -24px; border-radius: 50%;
    border: 1px solid rgba(232,82,122,0.18);
    animation: ringpulse 2.2s ease-in-out infinite 0.4s;
  }
  @keyframes ringpulse {
    0%,100% { opacity: 0.3; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.08); }
  }
  .heart-btn {
    width: 88px; height: 88px; border-radius: 50%;
    background: linear-gradient(135deg, #e8527a 0%, #c2185b 60%, #9c1040 100%);
    border: none; cursor: pointer; font-size: 38px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 35px rgba(220,80,120,0.65), 0 4px 20px rgba(0,0,0,0.4);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    animation: heartbeat 1.9s ease-in-out infinite;
    position: relative; z-index: 1;
    outline: none;
  }
  @keyframes heartbeat {
    0%,100% { transform: scale(1);    box-shadow: 0 0 35px rgba(220,80,120,0.65); }
    14%      { transform: scale(1.14); box-shadow: 0 0 55px rgba(220,80,120,0.9); }
    28%      { transform: scale(1);    }
    42%      { transform: scale(1.08); box-shadow: 0 0 45px rgba(220,80,120,0.75); }
    56%      { transform: scale(1);    }
  }
  .heart-btn:hover { transform: scale(1.07) !important; }
  .heart-btn:active { transform: scale(0.9)  !important; }

  /* ── Message box ── */
  .msg-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,180,200,0.16);
    border-radius: 16px; padding: 1.6rem 1.4rem;
    min-height: 110px;
    display: flex; align-items: center; justify-content: center;
    margin: 0.5rem 0 1rem;
  }
  .msg-text {
    font-size: 18px; line-height: 1.75;
    color: var(--rose-pale); font-style: italic;
    animation: msgIn 0.65s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(14px) scale(0.96); }
    to   { opacity: 1; transform: none; }
  }

  /* ── Tap hint ── */
  .tap-hint {
    font-family: 'Cinzel', serif;
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(255,180,200,0.38);
    animation: breathe 2.8s ease-in-out infinite;
    margin-bottom: 1.2rem;
  }
  @keyframes breathe { 0%,100%{opacity:0.3} 50%{opacity:0.85} }

  /* ── Progress dots ── */
  .dots {
    display: flex; gap: 7px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 0.8rem;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,180,200,0.18);
    transition: background 0.35s ease, transform 0.35s ease, box-shadow 0.35s ease;
  }
  .dot.done  { background: rgba(232,82,122,0.45); }
  .dot.active {
    background: var(--rose);
    transform: scale(1.5);
    box-shadow: 0 0 8px rgba(232,82,122,0.8);
  }

  /* ── Counter ── */
  .counter {
    font-family: 'Cinzel', serif;
    font-size: 10px; letter-spacing: 0.14em;
    color: rgba(255,180,200,0.28);
  }

  /* ── Burst emojis ── */
  .burst {
    position: fixed; pointer-events: none; z-index: 999;
    font-size: 22px;
    animation: burstfly 1s ease forwards;
  }
  @keyframes burstfly {
    0%  { opacity: 1; transform: translate(-50%,-50%) scale(0.3) rotate(0deg); }
    60% { opacity: 1; transform: translate(calc(-50% + var(--bx)), calc(-50% + var(--by))) scale(1.2) rotate(var(--br)); }
    100%{ opacity: 0; transform: translate(calc(-50% + var(--bx)), calc(-50% + var(--by) - 30px)) scale(0.7) rotate(var(--br)); }
  }

  /* ── Fireworks (canvas) ── */
  #fw-canvas {
    position: fixed; inset: 0; pointer-events: none; z-index: 998;
  }

  /* ── Final glow overlay ── */
  .final-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at center, rgba(220,80,140,0.12) 0%, transparent 70%);
    opacity: 0; transition: opacity 1.5s ease;
  }
  .final-glow.show { opacity: 1; }

  /* ── Responsive ── */
  @media (max-width: 500px) {
    .card { padding: 2rem 1.4rem 1.8rem; }
    .msg-text { font-size: 16px; }
    .name { font-size: 22px; }
  }
</style>
</head>
<body>

<canvas id="fw-canvas"></canvas>
<div class="final-glow" id="finalGlow"></div>
<div id="stars-layer"></div>
<div id="petals-layer"></div>

<div id="app">
  <div class="card" id="card">
    <p class="eyebrow">a message for you</p>
    <p class="name" id="nameEl">Sita 💕</p>
    <div class="divider"></div>

    <div class="heart-wrap">
      <div class="heart-ring2"></div>
      <div class="heart-ring"></div>
      <button class="heart-btn" id="heartBtn" aria-label="Tap for next message">❤️</button>
    </div>

    <div class="msg-box">
      <p class="msg-text" id="msgText">Tap the heart to open a message just for you…</p>
    </div>

    <p class="tap-hint" id="tapHint">tap the heart ✦</p>

    <div class="dots" id="dots"></div>
    <p class="counter" id="counter">&nbsp;</p>
  </div>
</div>

<script>
const messages = [
  "Three months of silence… but my heart hasn't been quiet for even a second. Every day, I thought of you.",
  "I miss the sound of your laugh. The way it fills a room and makes everything feel lighter. I miss that laugh so much.",
  "I've rehearsed a thousand apologies. None of them felt worthy of you. So I'll simply say — I'm sorry, truly and deeply.",
  "You crossed my mind at 2am, at noon, during songs I used to skip, during silences that felt too loud. You never really left.",
  "I don't want to go another three months without telling you how incredibly special you are to me.",
  "You have this rare, beautiful ability to make ordinary moments feel like something worth remembering forever.",
  "I was wrong to let distance grow between us. You deserved so much better from me, and I know that.",
  "If I could rewind, I'd choose every conversation, every silly argument, every quiet evening with you — all of it.",
  "There's a version of me that only exists around you — softer, lighter, more alive. I miss being that person.",
  "I kept your favorite song on repeat. It felt like the closest I could get to you on the hardest nights.",
  "Some feelings don't fade with time. Mine for you certainly haven't — not even a little.",
  "I'm asking for the chance to write something better, together.",
  "You are worth every awkward first step, every vulnerable word, every risk toward making things right.",
  "Whatever you decide — I want you to know you are loved. Not conditionally. Not in pieces. Completely.",
  "If this reaches your heart even a little… that's more than I could have hoped for. 💕",
  "You are, and have always been, my favorite person in the world. 🌸"
];

let current = -1;
const btn      = document.getElementById('heartBtn');
const msgText  = document.getElementById('msgText');
const counter  = document.getElementById('counter');
const dotsEl   = document.getElementById('dots');
const nameEl   = document.getElementById('nameEl');
const tapHint  = document.getElementById('tapHint');
const finalGlow= document.getElementById('finalGlow');

/* ── Stars ── */
const starsEl = document.getElementById('stars-layer');
for(let i=0;i<70;i++){
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random()*2.4+0.8;
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${1.8+Math.random()*3.5}s;--delay:${Math.random()*4}s`;
  starsEl.appendChild(s);
}

/* ── Dots ── */
messages.forEach((_,i)=>{
  const d = document.createElement('div');
  d.className = 'dot'; d.id = 'dot'+i;
  dotsEl.appendChild(d);
});

/* ── Petal shower ── */
function dropPetals(n=8){
  const em=['🌸','🌹','🌺','🌷','💐','✨','💖','💗','🌼','⭐'];
  for(let i=0;i<n;i++){
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = em[Math.floor(Math.random()*em.length)];
    p.style.cssText = `left:${5+Math.random()*90}%;font-size:${13+Math.random()*14}px;--dx:${(Math.random()-0.5)*120}px;animation-duration:${2.8+Math.random()*2.2}s;animation-delay:${Math.random()*0.6}s`;
    document.getElementById('petals-layer').appendChild(p);
    setTimeout(()=>p.remove(), 5500);
  }
}

/* ── Burst ── */
function spawnBurst(x,y){
  const em=['💕','✨','💗','🌸','💓','⭐','💝','🌹','💖'];
  for(let i=0;i<8;i++){
    const b = document.createElement('div');
    b.className = 'burst';
    b.textContent = em[Math.floor(Math.random()*em.length)];
    const angle = (Math.PI*2/8)*i + Math.random()*0.5;
    const dist  = 55+Math.random()*55;
    b.style.cssText = `left:${x}px;top:${y}px;--bx:${Math.cos(angle)*dist}px;--by:${Math.sin(angle)*dist}px;--br:${(Math.random()-0.5)*60}deg;animation-delay:${Math.random()*0.15}s`;
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),1100);
  }
}

/* ── Fireworks ── */
const fwCanvas = document.getElementById('fw-canvas');
const ctx = fwCanvas.getContext('2d');
let particles = [];
function resizeFW(){ fwCanvas.width=innerWidth; fwCanvas.height=innerHeight; }
resizeFW(); window.addEventListener('resize',resizeFW);

function launchFirework(x,y){
  const hue = 320+Math.random()*60;
  for(let i=0;i<55;i++){
    const angle = (Math.PI*2/55)*i;
    const speed = 2.5+Math.random()*4;
    particles.push({
      x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      alpha:1, hue, size:2.5+Math.random()*2.5
    });
  }
}

function animFW(){
  requestAnimationFrame(animFW);
  ctx.clearRect(0,0,fwCanvas.width,fwCanvas.height);
  particles = particles.filter(p=>p.alpha>0.02);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.07; p.vx*=0.97; p.alpha-=0.018;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=`hsla(${p.hue},90%,65%,${p.alpha})`;
    ctx.fill();
  });
}
animFW();

/* ── Click handler ── */
btn.addEventListener('click', function(e){
  current = (current+1) % messages.length;

  // Message swap
  msgText.style.animation='none';
  msgText.offsetHeight;
  msgText.textContent = messages[current];
  msgText.style.animation='msgIn 0.65s cubic-bezier(0.22,1,0.36,1) both';

  // Dots
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('done',   i < current);
    d.classList.toggle('active', i === current);
  });

  counter.textContent = `${current+1} of ${messages.length}`;

  // Effects
  dropPetals(current === messages.length-1 ? 18 : 8);
  spawnBurst(e.clientX, e.clientY);

  // Firework on every 4th tap
  if(current % 4 === 3 || current === messages.length-1){
    const fw = ()=>launchFirework(
      100+Math.random()*(innerWidth-200),
      50+Math.random()*(innerHeight*0.5)
    );
    fw(); setTimeout(fw,300); setTimeout(fw,600);
  }

  // Final message
  if(current === messages.length-1){
    nameEl.textContent = '💌 With all my love';
    tapHint.textContent = 'you mean everything to me ✦';
    finalGlow.classList.add('show');
    for(let i=0;i<6;i++) setTimeout(()=>launchFirework(
      100+Math.random()*(innerWidth-200),
      60+Math.random()*(innerHeight*0.55)
    ), i*350);
  }
});
</script>
</body>
</html>
